name: Web Preview

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run project validator
        run: python tools/validate_character_framework.py

      - name: Parse all design JSON
        run: |
          python - <<'PY'
          import glob
          import json

          for path in sorted(glob.glob("design/*.json")):
              with open(path, "r", encoding="utf-8") as f:
                  json.load(f)
              print(f"OK {path}")

          print("All design JSON files parsed successfully.")
          PY

  export-web:
    name: Export Godot Web build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy design data into Godot project for export
        run: |
          rm -rf godot/design
          cp -R design godot/design

      - name: Generate embedded design data fallback
        run: |
          python - <<'PY'
          import glob
          import json
          from pathlib import Path

          files = {}
          for path in sorted(glob.glob("design/*.json")):
              p = Path(path)
              files[p.name] = p.read_text(encoding="utf-8")

          out = Path("godot/scripts/generated/design_data_embedded.gd")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(
              "extends RefCounted\n"
              "class_name DesignDataEmbedded\n\n"
              "## Auto-generated by .github/workflows/web-preview.yml during Web export.\n"
              "## Contains root /design JSON data as strings for reliable Web loading.\n\n"
              "const FILES: Dictionary = " + json.dumps(files, indent=2) + "\n",
              encoding="utf-8",
          )
          print(f"Wrote {out} with {len(files)} embedded files")
          PY

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: true

      - name: Verify Godot install
        run: godot --version

      - name: Create web build folder
        run: mkdir -p build/web

      - name: Import Godot project
        working-directory: godot
        run: godot --headless --import --quit

      - name: Export Godot project to Web
        working-directory: godot
        run: godot --headless --verbose --export-release "Web" ../build/web/index.html

      - name: Confirm web build output
        run: |
          ls -la build/web
          test -f build/web/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4
