name: Web Preview

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run project validator
        run: python tools/validate_character_framework.py

      - name: Parse all design JSON
        run: |
          python - <<'PY'
          import glob
          import json

          for path in sorted(glob.glob("design/*.json")):
              with open(path, "r", encoding="utf-8") as f:
                  json.load(f)
              print(f"OK {path}")

          print("All design JSON files parsed successfully.")
          PY

  export-web:
    name: Export Godot Web build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export Godot project to Web
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./godot
          use_preset_export_path: true
          presets_to_export: Web
          cache: true
          verbose: true

      - name: Confirm web build output
        run: |
          ls -la build/web
          test -f build/web/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4
