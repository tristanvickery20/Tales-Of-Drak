name: Web Preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.3.0
  GODOT_STATUS: stable
  EXPORT_NAME: tales-of-drak

jobs:
  validate:
    name: Validate design data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate framework data
        run: python tools/validate_character_framework.py

      - name: Confirm every design/*.json parses
        run: |
          set -e
          python - <<'PY'
          import json, sys
          from pathlib import Path
          failed = []
          for p in sorted(Path("design").glob("*.json")):
              try:
                  json.loads(p.read_text())
                  print(f"ok   {p}")
              except Exception as exc:
                  failed.append((p, exc))
                  print(f"FAIL {p}: {exc}")
          if failed:
              sys.exit(1)
          PY

  export-web:
    name: Export Godot project to Web
    runs-on: ubuntu-latest
    needs: validate
    container:
      image: barichello/godot-ci:4.3.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS} \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}

      - name: Export Web build
        working-directory: godot
        run: |
          mkdir -p ../build/web
          godot --headless --export-release "Web" ../build/web/index.html

      - name: Rename index for GitHub Pages
        run: |
          # GitHub Pages serves index.html by default; Godot Web export already
          # produces index.html so nothing to rename. Just list what we got.
          ls -la build/web

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: export-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
